aid: paylocity
name: Paylocity
description: >-
  Paylocity is a cloud-based human capital management (HCM) and payroll
  software provider serving small and mid-sized US employers with payroll,
  benefits administration, talent management, time and labor tracking, and
  workforce analytics. The platform powers HR back-office operations along
  with employee self-service tools. The Paylocity API uses OAuth 2.0 client
  credentials over api.paylocity.com to expose employee, payroll, deduction,
  earning, and onboarding data for partner integrations and customer
  automations.
type: Index
