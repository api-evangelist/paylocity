apis:
  - aid: paylocity:rest-api
    name: Paylocity Integrations REST API
    description: >-
      REST API for managing employees, demographics, status, pay rates,
      direct deposit, deductions, earnings, taxes, custom fields, company
      codes, and onboarding via the Paylocity Integrations platform.
      Authentication uses OAuth 2.0 client credentials issued by the
      Paylocity Identity Provider; tokens expire after one hour.
    humanURL: https://developer.paylocity.com/integrations/reference/api-overview
    baseURL: https://api.paylocity.com/api
