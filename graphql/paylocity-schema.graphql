"""
Paylocity GraphQL Schema
Conceptual schema derived from the Paylocity REST API covering employee records,
payroll processing, time and attendance, benefits administration, expense management,
performance reviews, and compliance reporting.
"""

# ──────────────────────────────────────────────
# Scalars
# ──────────────────────────────────────────────

scalar Date
scalar DateTime
scalar Decimal
scalar JSON

# ──────────────────────────────────────────────
# Enums
# ──────────────────────────────────────────────

enum EmployeeStatus {
  ACTIVE
  INACTIVE
  TERMINATED
  LEAVE_OF_ABSENCE
  PENDING
}

enum PayType {
  HOURLY
  SALARY
  COMMISSION
  CONTRACT
  PER_DIEM
}

enum PayFrequency {
  WEEKLY
  BIWEEKLY
  SEMIMONTHLY
  MONTHLY
  ANNUALLY
}

enum MaritalStatus {
  SINGLE
  MARRIED
  DOMESTIC_PARTNER
  DIVORCED
  WIDOWED
  SEPARATED
}

enum Gender {
  MALE
  FEMALE
  NONBINARY
  PREFER_NOT_TO_SAY
}

enum DirectDepositType {
  CHECKING
  SAVINGS
}

enum DeductionType {
  PRE_TAX
  POST_TAX
  TAX
  GARNISHMENT
}

enum BenefitType {
  MEDICAL
  DENTAL
  VISION
  LIFE_INSURANCE
  DISABILITY
  FSA
  HSA
  RETIREMENT_401K
  OTHER
}

enum TimeOffStatus {
  PENDING
  APPROVED
  DENIED
  CANCELLED
}

enum TimesheetStatus {
  DRAFT
  SUBMITTED
  APPROVED
  REJECTED
  PROCESSED
}

enum ExpenseStatus {
  DRAFT
  SUBMITTED
  APPROVED
  REJECTED
  PAID
}

enum PerformanceRating {
  EXCEPTIONAL
  EXCEEDS_EXPECTATIONS
  MEETS_EXPECTATIONS
  NEEDS_IMPROVEMENT
  UNSATISFACTORY
}

enum OnboardingStatus {
  NOT_STARTED
  IN_PROGRESS
  COMPLETED
  ON_HOLD
}

enum ComplianceReportType {
  EEO1
  VETS4212
  ACA
  W2
  FLSA
  OSHA
}

enum SortOrder {
  ASC
  DESC
}

# ──────────────────────────────────────────────
# Core Employee Types
# ──────────────────────────────────────────────

"""A Paylocity employee record."""
type Employee {
  employeeId: ID!
  companyId: String!
  firstName: String!
  lastName: String!
  middleName: String
  preferredName: String
  suffix: String
  ssn: String
  birthDate: Date
  gender: Gender
  maritalStatus: MaritalStatus
  status: EmployeeStatus!
  hireDate: Date!
  terminationDate: Date
  rehireDate: Date
  department: Department
  position: Position
  location: WorkLocation
  supervisor: Employee
  directReports: [Employee!]
  demographics: EmployeeDemographics
  contact: EmployeeContact
  payInfo: PayInfo
  directDeposits: [DirectDeposit!]
  deductions: [Deduction!]
  earnings: [Earning!]
  taxes: [EmployeeTax!]
  benefits: [BenefitEnrollment!]
  customFields: [CustomField!]
  timeOffBalances: [TimeOffBalance!]
  timesheets: [Timesheet!]
  expenses: [ExpenseReport!]
  performanceReviews: [PerformanceReview!]
  onboarding: OnboardingRecord
  documents: [Document!]
  training: [TrainingRecord!]
  createdAt: DateTime!
  updatedAt: DateTime!
}

"""Demographic information for an employee."""
type EmployeeDemographics {
  employeeId: ID!
  ethnicity: String
  veteranStatus: String
  disabilityStatus: String
  citizenshipStatus: String
  i9Verified: Boolean
  i9VerificationDate: Date
  workAuthorizationType: String
  workAuthorizationExpiry: Date
}

"""Contact information for an employee."""
type EmployeeContact {
  employeeId: ID!
  homeAddress: Address
  mailingAddress: Address
  workPhone: String
  mobilePhone: String
  homePhone: String
  workEmail: String
  personalEmail: String
  emergencyContacts: [EmergencyContact!]
}

"""Address type used across the schema."""
type Address {
  street1: String!
  street2: String
  city: String!
  state: String!
  postalCode: String!
  country: String!
}

"""Emergency contact for an employee."""
type EmergencyContact {
  id: ID!
  employeeId: ID!
  name: String!
  relationship: String!
  phone: String!
  email: String
  isPrimary: Boolean!
}

# ──────────────────────────────────────────────
# Organizational Structure
# ──────────────────────────────────────────────

"""A company registered in Paylocity."""
type Company {
  companyId: ID!
  companyName: String!
  ein: String
  address: Address
  phone: String
  website: String
  departments: [Department!]
  locations: [WorkLocation!]
  positions: [Position!]
  payGroups: [PayGroup!]
  customFieldDefinitions: [CustomFieldDefinition!]
  employees: [Employee!]
  createdAt: DateTime!
  updatedAt: DateTime!
}

"""A department within a company."""
type Department {
  departmentId: ID!
  companyId: String!
  code: String!
  description: String!
  parentDepartment: Department
  children: [Department!]
  manager: Employee
  employees: [Employee!]
  costCenter: CostCenter
  isActive: Boolean!
}

"""A job position definition."""
type Position {
  positionId: ID!
  companyId: String!
  code: String!
  title: String!
  description: String
  payGrade: String
  flsaClassification: String
  isActive: Boolean!
  employees: [Employee!]
}

"""A physical or virtual work location."""
type WorkLocation {
  locationId: ID!
  companyId: String!
  code: String!
  description: String!
  address: Address!
  phone: String
  isActive: Boolean!
  employees: [Employee!]
}

"""A cost center for financial tracking."""
type CostCenter {
  costCenterId: ID!
  companyId: String!
  code: String!
  description: String!
  isActive: Boolean!
}

# ──────────────────────────────────────────────
# Payroll Types
# ──────────────────────────────────────────────

"""Pay information for an employee."""
type PayInfo {
  employeeId: ID!
  payType: PayType!
  payRate: Decimal!
  payFrequency: PayFrequency!
  payGroup: PayGroup
  defaultHours: Decimal
  annualSalary: Decimal
  effectiveDate: Date!
  history: [PayRateHistory!]
}

"""Historical pay rate record."""
type PayRateHistory {
  id: ID!
  employeeId: ID!
  payType: PayType!
  payRate: Decimal!
  payFrequency: PayFrequency!
  effectiveDate: Date!
  endDate: Date
  changeReason: String
  approvedBy: String
}

"""A pay group defining pay schedule."""
type PayGroup {
  payGroupId: ID!
  companyId: String!
  code: String!
  description: String!
  frequency: PayFrequency!
  employees: [Employee!]
  payPeriods: [PayPeriod!]
}

"""A single pay period."""
type PayPeriod {
  payPeriodId: ID!
  payGroupId: String!
  startDate: Date!
  endDate: Date!
  checkDate: Date!
  status: String!
  paychecks: [Paycheck!]
}

"""A paycheck issued to an employee."""
type Paycheck {
  paycheckId: ID!
  employeeId: ID!
  payPeriodId: ID!
  grossPay: Decimal!
  netPay: Decimal!
  totalDeductions: Decimal!
  totalTaxes: Decimal!
  checkDate: Date!
  checkNumber: String
  isVoid: Boolean!
  earnings: [PaycheckEarning!]
  deductions: [PaycheckDeduction!]
  taxes: [PaycheckTax!]
}

"""An earning line on a paycheck."""
type PaycheckEarning {
  id: ID!
  paycheckId: ID!
  earningCode: String!
  description: String!
  hours: Decimal
  rate: Decimal
  amount: Decimal!
}

"""A deduction line on a paycheck."""
type PaycheckDeduction {
  id: ID!
  paycheckId: ID!
  deductionCode: String!
  description: String!
  amount: Decimal!
  employerAmount: Decimal
}

"""A tax line on a paycheck."""
type PaycheckTax {
  id: ID!
  paycheckId: ID!
  taxCode: String!
  description: String!
  amount: Decimal!
  employerAmount: Decimal
  jurisdiction: String
}

"""A direct deposit account for an employee."""
type DirectDeposit {
  directDepositId: ID!
  employeeId: ID!
  bankName: String!
  accountType: DirectDepositType!
  routingNumber: String!
  accountNumber: String!
  amount: Decimal
  percentage: Decimal
  priority: Int!
  isRemainder: Boolean!
  isActive: Boolean!
}

"""A recurring payroll deduction."""
type Deduction {
  deductionId: ID!
  employeeId: ID!
  companyId: String!
  code: String!
  description: String!
  type: DeductionType!
  amount: Decimal
  percentage: Decimal
  effectiveDate: Date!
  endDate: Date
  isActive: Boolean!
}

"""A recurring earning code for an employee."""
type Earning {
  earningId: ID!
  employeeId: ID!
  companyId: String!
  code: String!
  description: String!
  hours: Decimal
  amount: Decimal
  effectiveDate: Date!
  endDate: Date
  isActive: Boolean!
}

"""Tax withholding setup for an employee."""
type EmployeeTax {
  taxId: ID!
  employeeId: ID!
  taxCode: String!
  description: String!
  filingStatus: String
  allowances: Int
  additionalAmount: Decimal
  exemptFromTax: Boolean!
  effectiveDate: Date!
}

# ──────────────────────────────────────────────
# Benefits Administration
# ──────────────────────────────────────────────

"""A benefit plan available to employees."""
type BenefitPlan {
  planId: ID!
  companyId: String!
  name: String!
  type: BenefitType!
  carrier: String
  planCode: String!
  description: String
  employeeContribution: Decimal
  employerContribution: Decimal
  isActive: Boolean!
  enrollmentPeriod: EnrollmentPeriod
  enrollments: [BenefitEnrollment!]
}

"""An open enrollment period for benefit plans."""
type EnrollmentPeriod {
  periodId: ID!
  companyId: String!
  name: String!
  startDate: Date!
  endDate: Date!
  effectiveDate: Date!
  plans: [BenefitPlan!]
}

"""An employee's enrollment in a benefit plan."""
type BenefitEnrollment {
  enrollmentId: ID!
  employeeId: ID!
  planId: ID!
  plan: BenefitPlan!
  coverageLevel: String!
  employeeContribution: Decimal!
  employerContribution: Decimal!
  effectiveDate: Date!
  endDate: Date
  dependents: [BenefitDependent!]
  isActive: Boolean!
}

"""A dependent covered under an employee's benefit enrollment."""
type BenefitDependent {
  dependentId: ID!
  enrollmentId: ID!
  firstName: String!
  lastName: String!
  relationship: String!
  birthDate: Date!
  ssn: String
  isDisabled: Boolean
}

# ──────────────────────────────────────────────
# Time and Attendance
# ──────────────────────────────────────────────

"""A timesheet for a pay period."""
type Timesheet {
  timesheetId: ID!
  employeeId: ID!
  payPeriodId: ID!
  startDate: Date!
  endDate: Date!
  status: TimesheetStatus!
  totalHours: Decimal!
  regularHours: Decimal!
  overtimeHours: Decimal!
  entries: [TimeEntry!]
  submittedAt: DateTime
  approvedAt: DateTime
  approvedBy: String
}

"""A single time entry on a timesheet."""
type TimeEntry {
  entryId: ID!
  timesheetId: ID!
  date: Date!
  clockIn: DateTime
  clockOut: DateTime
  hours: Decimal!
  earningCode: String!
  projectCode: String
  notes: String
  isManual: Boolean!
}

"""A time-off policy type (PTO, sick, vacation, etc.)."""
type TimeOffType {
  typeId: ID!
  companyId: String!
  code: String!
  name: String!
  description: String
  accrualRate: Decimal
  maxAccrual: Decimal
  carryoverLimit: Decimal
  isActive: Boolean!
}

"""An employee's time-off balance for a policy type."""
type TimeOffBalance {
  balanceId: ID!
  employeeId: ID!
  timeOffTypeId: ID!
  timeOffType: TimeOffType!
  available: Decimal!
  used: Decimal!
  accrued: Decimal!
  pending: Decimal!
  asOfDate: Date!
}

"""A time-off request submitted by an employee."""
type TimeOffRequest {
  requestId: ID!
  employeeId: ID!
  timeOffTypeId: ID!
  timeOffType: TimeOffType!
  startDate: Date!
  endDate: Date!
  hours: Decimal!
  status: TimeOffStatus!
  notes: String
  submittedAt: DateTime!
  reviewedAt: DateTime
  reviewedBy: String
  reviewNotes: String
}

# ──────────────────────────────────────────────
# Expense Management
# ──────────────────────────────────────────────

"""An expense report submitted by an employee."""
type ExpenseReport {
  reportId: ID!
  employeeId: ID!
  title: String!
  description: String
  status: ExpenseStatus!
  totalAmount: Decimal!
  currency: String!
  submittedDate: Date
  approvedDate: Date
  paidDate: Date
  approvedBy: String
  items: [ExpenseItem!]
  receipts: [Document!]
  createdAt: DateTime!
  updatedAt: DateTime!
}

"""An individual expense line item."""
type ExpenseItem {
  itemId: ID!
  reportId: ID!
  date: Date!
  category: String!
  description: String!
  amount: Decimal!
  currency: String!
  merchant: String
  projectCode: String
  isBillable: Boolean!
  receipt: Document
}

# ──────────────────────────────────────────────
# Performance Management
# ──────────────────────────────────────────────

"""A performance review cycle."""
type ReviewCycle {
  cycleId: ID!
  companyId: String!
  name: String!
  startDate: Date!
  endDate: Date!
  dueDate: Date!
  isActive: Boolean!
  reviews: [PerformanceReview!]
}

"""A performance review for an employee."""
type PerformanceReview {
  reviewId: ID!
  employeeId: ID!
  reviewCycleId: ID!
  reviewCycle: ReviewCycle!
  reviewer: Employee!
  overallRating: PerformanceRating
  status: String!
  completedDate: Date
  goals: [PerformanceGoal!]
  competencies: [CompetencyRating!]
  comments: String
  employeeComments: String
}

"""A goal set for an employee."""
type PerformanceGoal {
  goalId: ID!
  reviewId: ID!
  title: String!
  description: String
  dueDate: Date
  weight: Decimal
  rating: PerformanceRating
  completionPercentage: Decimal
  comments: String
}

"""A competency rating within a performance review."""
type CompetencyRating {
  id: ID!
  reviewId: ID!
  competencyName: String!
  rating: PerformanceRating!
  comments: String
}

# ──────────────────────────────────────────────
# Onboarding
# ──────────────────────────────────────────────

"""Onboarding record for a new employee."""
type OnboardingRecord {
  onboardingId: ID!
  employeeId: ID!
  status: OnboardingStatus!
  startDate: Date!
  completedDate: Date
  tasks: [OnboardingTask!]
  documents: [Document!]
}

"""A task within an onboarding workflow."""
type OnboardingTask {
  taskId: ID!
  onboardingId: ID!
  title: String!
  description: String
  dueDate: Date
  isCompleted: Boolean!
  completedAt: DateTime
  completedBy: String
  category: String
}

# ──────────────────────────────────────────────
# Documents and Training
# ──────────────────────────────────────────────

"""A document stored in the system."""
type Document {
  documentId: ID!
  companyId: String!
  employeeId: ID
  name: String!
  type: String!
  url: String!
  fileSize: Int
  mimeType: String
  uploadedAt: DateTime!
  uploadedBy: String!
  expiryDate: Date
  tags: [String!]
}

"""A training record for an employee."""
type TrainingRecord {
  trainingId: ID!
  employeeId: ID!
  courseName: String!
  provider: String
  completionDate: Date
  expiryDate: Date
  certificateUrl: String
  status: String!
  hours: Decimal
  isRequired: Boolean!
}

# ──────────────────────────────────────────────
# Custom Fields
# ──────────────────────────────────────────────

"""Definition of a custom field for a company."""
type CustomFieldDefinition {
  definitionId: ID!
  companyId: String!
  name: String!
  label: String!
  dataType: String!
  isRequired: Boolean!
  options: [String!]
  category: String!
  isActive: Boolean!
}

"""A custom field value on an employee record."""
type CustomField {
  fieldId: ID!
  employeeId: ID!
  definition: CustomFieldDefinition!
  value: String
  updatedAt: DateTime!
}

# ──────────────────────────────────────────────
# Company Codes
# ──────────────────────────────────────────────

"""A company-defined code (earning code, deduction code, etc.)."""
type CompanyCode {
  codeId: ID!
  companyId: String!
  codeType: String!
  code: String!
  description: String!
  isActive: Boolean!
  metadata: JSON
}

# ──────────────────────────────────────────────
# Compliance Reporting
# ──────────────────────────────────────────────

"""A compliance report generated for regulatory purposes."""
type ComplianceReport {
  reportId: ID!
  companyId: String!
  type: ComplianceReportType!
  year: Int!
  period: String
  generatedAt: DateTime!
  generatedBy: String!
  status: String!
  fileUrl: String
  metadata: JSON
}

# ──────────────────────────────────────────────
# Pagination and Filtering
# ──────────────────────────────────────────────

"""Pagination metadata returned with list queries."""
type PageInfo {
  totalCount: Int!
  pageSize: Int!
  currentPage: Int!
  totalPages: Int!
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
}

"""Paginated list of employees."""
type EmployeeConnection {
  employees: [Employee!]!
  pageInfo: PageInfo!
}

"""Paginated list of paychecks."""
type PaycheckConnection {
  paychecks: [Paycheck!]!
  pageInfo: PageInfo!
}

"""Paginated list of time-off requests."""
type TimeOffRequestConnection {
  requests: [TimeOffRequest!]!
  pageInfo: PageInfo!
}

"""Paginated list of expense reports."""
type ExpenseReportConnection {
  reports: [ExpenseReport!]!
  pageInfo: PageInfo!
}

"""Paginated list of performance reviews."""
type PerformanceReviewConnection {
  reviews: [PerformanceReview!]!
  pageInfo: PageInfo!
}

# ──────────────────────────────────────────────
# Filter Inputs
# ──────────────────────────────────────────────

input EmployeeFilter {
  status: EmployeeStatus
  departmentId: ID
  locationId: ID
  positionId: ID
  payGroupId: ID
  hireDateFrom: Date
  hireDateTo: Date
  search: String
}

input PaycheckFilter {
  employeeId: ID
  payPeriodId: ID
  checkDateFrom: Date
  checkDateTo: Date
  isVoid: Boolean
}

input TimeOffRequestFilter {
  employeeId: ID
  status: TimeOffStatus
  timeOffTypeId: ID
  startDateFrom: Date
  startDateTo: Date
}

input ExpenseReportFilter {
  employeeId: ID
  status: ExpenseStatus
  submittedDateFrom: Date
  submittedDateTo: Date
}

input PaginationInput {
  page: Int = 1
  pageSize: Int = 50
}

input SortInput {
  field: String!
  order: SortOrder = ASC
}

# ──────────────────────────────────────────────
# Mutation Inputs
# ──────────────────────────────────────────────

input CreateEmployeeInput {
  companyId: String!
  firstName: String!
  lastName: String!
  middleName: String
  ssn: String
  birthDate: Date
  gender: Gender
  maritalStatus: MaritalStatus
  hireDate: Date!
  departmentId: ID
  positionId: ID
  locationId: ID
  supervisorId: ID
}

input UpdateEmployeeInput {
  firstName: String
  lastName: String
  middleName: String
  preferredName: String
  gender: Gender
  maritalStatus: MaritalStatus
  departmentId: ID
  positionId: ID
  locationId: ID
  supervisorId: ID
  status: EmployeeStatus
}

input CreateDirectDepositInput {
  employeeId: ID!
  bankName: String!
  accountType: DirectDepositType!
  routingNumber: String!
  accountNumber: String!
  amount: Decimal
  percentage: Decimal
  priority: Int!
  isRemainder: Boolean!
}

input CreateDeductionInput {
  employeeId: ID!
  companyId: String!
  code: String!
  type: DeductionType!
  amount: Decimal
  percentage: Decimal
  effectiveDate: Date!
  endDate: Date
}

input CreateTimeOffRequestInput {
  employeeId: ID!
  timeOffTypeId: ID!
  startDate: Date!
  endDate: Date!
  hours: Decimal!
  notes: String
}

input CreateExpenseReportInput {
  employeeId: ID!
  title: String!
  description: String
  currency: String!
}

input AddExpenseItemInput {
  reportId: ID!
  date: Date!
  category: String!
  description: String!
  amount: Decimal!
  currency: String!
  merchant: String
  projectCode: String
  isBillable: Boolean!
}

input CreatePerformanceGoalInput {
  reviewId: ID!
  title: String!
  description: String
  dueDate: Date
  weight: Decimal
}

# ──────────────────────────────────────────────
# Root Types
# ──────────────────────────────────────────────

type Query {
  """Retrieve a single company by ID."""
  company(companyId: ID!): Company

  """Retrieve a single employee by ID."""
  employee(companyId: String!, employeeId: ID!): Employee

  """List employees with optional filtering and pagination."""
  employees(
    companyId: String!
    filter: EmployeeFilter
    pagination: PaginationInput
    sort: SortInput
  ): EmployeeConnection!

  """Retrieve a pay period by ID."""
  payPeriod(payPeriodId: ID!): PayPeriod

  """List pay periods for a pay group."""
  payPeriods(payGroupId: ID!, startDate: Date, endDate: Date): [PayPeriod!]!

  """Retrieve a specific paycheck."""
  paycheck(paycheckId: ID!): Paycheck

  """List paychecks with filtering and pagination."""
  paychecks(
    companyId: String!
    filter: PaycheckFilter
    pagination: PaginationInput
  ): PaycheckConnection!

  """Get a benefit plan by ID."""
  benefitPlan(planId: ID!): BenefitPlan

  """List benefit plans for a company."""
  benefitPlans(companyId: String!, type: BenefitType): [BenefitPlan!]!

  """Get a timesheet by ID."""
  timesheet(timesheetId: ID!): Timesheet

  """List timesheets for an employee."""
  timesheets(employeeId: ID!, payPeriodId: ID): [Timesheet!]!

  """Get time-off balances for an employee."""
  timeOffBalances(employeeId: ID!): [TimeOffBalance!]!

  """List time-off requests with filtering."""
  timeOffRequests(
    companyId: String!
    filter: TimeOffRequestFilter
    pagination: PaginationInput
  ): TimeOffRequestConnection!

  """Get an expense report by ID."""
  expenseReport(reportId: ID!): ExpenseReport

  """List expense reports."""
  expenseReports(
    companyId: String!
    filter: ExpenseReportFilter
    pagination: PaginationInput
  ): ExpenseReportConnection!

  """Get a performance review by ID."""
  performanceReview(reviewId: ID!): PerformanceReview

  """List performance reviews."""
  performanceReviews(
    companyId: String!
    employeeId: ID
    cycleId: ID
    pagination: PaginationInput
  ): PerformanceReviewConnection!

  """Get an onboarding record for an employee."""
  onboardingRecord(employeeId: ID!): OnboardingRecord

  """List compliance reports for a company."""
  complianceReports(
    companyId: String!
    type: ComplianceReportType
    year: Int
  ): [ComplianceReport!]!

  """List departments for a company."""
  departments(companyId: String!): [Department!]!

  """List positions for a company."""
  positions(companyId: String!): [Position!]!

  """List work locations for a company."""
  workLocations(companyId: String!): [WorkLocation!]!

  """List pay groups for a company."""
  payGroups(companyId: String!): [PayGroup!]!

  """List company codes by type."""
  companyCodes(companyId: String!, codeType: String): [CompanyCode!]!

  """List custom field definitions for a company."""
  customFieldDefinitions(companyId: String!, category: String): [CustomFieldDefinition!]!
}

type Mutation {
  """Create a new employee."""
  createEmployee(input: CreateEmployeeInput!): Employee!

  """Update an existing employee."""
  updateEmployee(employeeId: ID!, input: UpdateEmployeeInput!): Employee!

  """Terminate an employee."""
  terminateEmployee(employeeId: ID!, terminationDate: Date!, reason: String): Employee!

  """Add a direct deposit account for an employee."""
  createDirectDeposit(input: CreateDirectDepositInput!): DirectDeposit!

  """Delete a direct deposit account."""
  deleteDirectDeposit(directDepositId: ID!): Boolean!

  """Add a deduction for an employee."""
  createDeduction(input: CreateDeductionInput!): Deduction!

  """Update a deduction."""
  updateDeduction(deductionId: ID!, amount: Decimal, endDate: Date): Deduction!

  """Submit a time-off request."""
  createTimeOffRequest(input: CreateTimeOffRequestInput!): TimeOffRequest!

  """Approve or deny a time-off request."""
  reviewTimeOffRequest(
    requestId: ID!
    status: TimeOffStatus!
    notes: String
  ): TimeOffRequest!

  """Submit a timesheet for approval."""
  submitTimesheet(timesheetId: ID!): Timesheet!

  """Approve or reject a timesheet."""
  reviewTimesheet(timesheetId: ID!, status: TimesheetStatus!, notes: String): Timesheet!

